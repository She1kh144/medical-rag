services:
  db:
    image: pgvector/pgvector:pg15
    environment:
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: medical_rag
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5433:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d medical_rag"]
      interval: 5s
      timeout: 5s
      retries: 10

  app:
    build: .
    environment:
      DEEPSEEK_API_KEY: ${DEEPSEEK_API_KEY}
      DB_HOST: db
      DB_PORT: 5432
      DB_NAME: medical_rag
      DB_USER: postgres
      DB_PASSWORD: ${POSTGRES_PASSWORD}
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy

volumes:
  pgdata: